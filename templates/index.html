<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 贪吃蛇（Python + Web）</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        background: #0b1020;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        line-height: 1.5;
        user-select: none;
      }
      #hint {
        opacity: 0.8;
        font-size: 13px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      #overlay[hidden] {
        display: none;
      }
      #panel {
        background: rgba(12, 18, 40, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 14px;
        padding: 24px;
        max-width: 360px;
      }
      button {
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: #4f83ff;
        color: #fff;
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #5f91ff;
      }
      #controls {
        position: fixed;
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 8px;
        user-select: none;
        touch-action: manipulation;
      }
      #controls button {
        margin: 0;
        width: 56px;
        height: 56px;
        border-radius: 8px;
        background: rgba(79, 131, 255, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.28);
        font-size: 22px;
        font-weight: 700;
      }
      #controls button:active {
        transform: translateY(1px);
        background: rgba(95, 145, 255, 0.95);
      }
      #controls [data-dir="up"] {
        grid-column: 2;
        grid-row: 1;
      }
      #controls [data-dir="left"] {
        grid-column: 1;
        grid-row: 2;
      }
      #controls [data-dir="right"] {
        grid-column: 3;
        grid-row: 2;
      }
      #controls [data-dir="down"] {
        grid-column: 2;
        grid-row: 3;
      }
      @media (pointer: fine) and (min-width: 900px) {
        #controls {
          opacity: 0.28;
        }
        #controls:hover {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div>分数：<span id="score">0</span></div>
      <div>最高分：<span id="best">0</span></div>
      <div id="hint">方向键 / WASD / 触屏按钮 / 滑动控制；空格暂停</div>
    </div>

    <div id="overlay" hidden>
      <div id="panel">
        <h2 id="title">游戏结束</h2>
        <p id="message"></p>
        <button id="restart">重新开始</button>
      </div>
    </div>

    <div id="controls" aria-label="触屏方向控制">
      <button type="button" data-dir="up" aria-label="向上">↑</button>
      <button type="button" data-dir="left" aria-label="向左">←</button>
      <button type="button" data-dir="right" aria-label="向右">→</button>
      <button type="button" data-dir="down" aria-label="向下">↓</button>
    </div>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

      const GRID = 18;
      const HALF = Math.floor(GRID / 2);
      const STEP_MS = 180;

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0b1020, 20, 65);

      const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(17, 20, 23);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.45);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
      dirLight.position.set(12, 18, 8);
      dirLight.castShadow = true;
      scene.add(dirLight);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(GRID + 2, GRID + 2),
        new THREE.MeshStandardMaterial({ color: 0x101a3a, roughness: 0.9 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.55;
      floor.receiveShadow = true;
      scene.add(floor);

      const gridHelper = new THREE.GridHelper(GRID + 1, GRID + 1, 0x5672c7, 0x324a89);
      scene.add(gridHelper);

      const snakeMat  = new THREE.MeshStandardMaterial({ color: 0x47ff8a, emissive: 0x0a5522 });
      const headMat   = new THREE.MeshStandardMaterial({ color: 0x8cffd5, emissive: 0x1b7c4b });
      const foodMat   = new THREE.MeshStandardMaterial({ color: 0xff5c7a, emissive: 0x661324 });
      const blockGeo  = new THREE.BoxGeometry(0.9, 0.9, 0.9);

      const snakeGroup = new THREE.Group();
      scene.add(snakeGroup);

      const foodMesh = new THREE.Mesh(blockGeo, foodMat);
      foodMesh.castShadow = true;
      scene.add(foodMesh);

      /* ============ Mesh Pool ============ */
      const meshPool = [];

      function getMesh(material) {
        let m = meshPool.pop();
        if (!m) {
          m = new THREE.Mesh(blockGeo, material);
          m.castShadow = true;
        } else {
          m.material = material;
        }
        m.visible = true;
        return m;
      }

      function recycleMeshes() {
        while (snakeGroup.children.length) {
          const m = snakeGroup.children[0];
          snakeGroup.remove(m);
          m.visible = false;
          meshPool.push(m);
        }
      }

      /* ============ State ============ */
      let snake     = [];
      let prevSnake = [];
      let direction = new THREE.Vector3(1, 0, 0);
      let queuedDir = direction.clone();
      let food      = { x: 0, y: 0, z: 0 };
      let score     = 0;
      let best      = Number(localStorage.getItem('snake3d-best') || 0);
      let paused    = false;
      let gameOver  = false;

      const scoreEl    = document.getElementById('score');
      const bestEl     = document.getElementById('best');
      const overlay    = document.getElementById('overlay');
      const titleEl    = document.getElementById('title');
      const messageEl  = document.getElementById('message');
      const restartBtn = document.getElementById('restart');
      bestEl.textContent = String(best);

      /* ============ Helpers ============ */
      function samePos(a, b) {
        return a.x === b.x && a.y === b.y && a.z === b.z;
      }

      function randomCell() {
        return {
          x: Math.floor(Math.random() * GRID) - HALF,
          y: 0,
          z: Math.floor(Math.random() * GRID) - HALF,
        };
      }

      function spawnFood() {
        let c = randomCell();
        while (snake.some(p => samePos(p, c))) c = randomCell();
        food = c;
        foodMesh.position.set(food.x, food.y, food.z);
      }

      function resetSnake() {
        snake = [
          { x: -2, y: 0, z: 0 },
          { x: -3, y: 0, z: 0 },
          { x: -4, y: 0, z: 0 },
        ];
        prevSnake = snake.map(p => ({ ...p }));
        direction.set(1, 0, 0);
        queuedDir = direction.clone();
      }

      function setOverlay(show, msg = '') {
        overlay.hidden = !show;
        messageEl.textContent = msg;
      }

      function endGame() {
        gameOver = true;
        if (score > best) {
          best = score;
          localStorage.setItem('snake3d-best', String(best));
          bestEl.textContent = String(best);
        }
        titleEl.textContent = '游戏结束';
        setOverlay(true, '\u6700\u7ec8\u5f97\u5206\uff1a' + score);
      }

      /* ============ Sync visual meshes ============ */
      function syncSnakeMeshes() {
        recycleMeshes();
        for (let i = 0; i < snake.length; i++) {
          const mesh = getMesh(i === 0 ? headMat : snakeMat);
          mesh.position.set(snake[i].x, snake[i].y, snake[i].z);
          snakeGroup.add(mesh);
        }
      }

      function restart() {
        score = 0;
        paused = false;
        gameOver = false;
        scoreEl.textContent = '0';
        titleEl.textContent = '暂停';
        resetSnake();
        spawnFood();
        setOverlay(false);
        syncSnakeMeshes();
      }

      /* ============ Direction ============ */
      function isOpposite(next, cur) {
        return next.x + cur.x === 0 && next.z + cur.z === 0;
      }

      function setDirection(next) {
        if (!gameOver && !isOpposite(next, direction)) queuedDir = next.clone();
      }

      const keyDir = {
        ArrowUp:    new THREE.Vector3( 0, 0, -1),
        KeyW:       new THREE.Vector3( 0, 0, -1),
        ArrowDown:  new THREE.Vector3( 0, 0,  1),
        KeyS:       new THREE.Vector3( 0, 0,  1),
        ArrowLeft:  new THREE.Vector3(-1, 0,  0),
        KeyA:       new THREE.Vector3(-1, 0,  0),
        ArrowRight: new THREE.Vector3( 1, 0,  0),
        KeyD:       new THREE.Vector3( 1, 0,  0),
      };

      /* ============ Input ============ */
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          if (!gameOver) {
            paused = !paused;
            setOverlay(paused, paused ? '已暂停（空格继续）' : '');
          }
          return;
        }
        if (!(e.code in keyDir) || gameOver) return;
        setDirection(keyDir[e.code]);
      });

      restartBtn.addEventListener('click', restart);

      document.querySelectorAll('#controls button').forEach((btn) => {
        btn.addEventListener('click', () => {
          const d = btn.dataset.dir;
          setDirection(keyDir['Arrow' + d[0].toUpperCase() + d.slice(1)]);
        });
      });

      let touchStart = null;
      renderer.domElement.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        touchStart = { x: t.clientX, y: t.clientY };
      }, { passive: true });

      renderer.domElement.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        touchStart = null;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 28) return;
        if (Math.abs(dx) > Math.abs(dy)) {
          setDirection(dx > 0 ? keyDir.ArrowRight : keyDir.ArrowLeft);
        } else {
          setDirection(dy > 0 ? keyDir.ArrowDown : keyDir.ArrowUp);
        }
      }, { passive: true });

      /* ============ Main loop with smooth interpolation ============ */
      let lastStep = 0;
      const _camTarget = new THREE.Vector3();
      const _camLookAt = new THREE.Vector3();

      function step(t) {
        requestAnimationFrame(step);

        foodMesh.rotation.y += 0.03;

        if (paused || gameOver) {
          renderer.render(scene, camera);
          return;
        }

        /* --- Logic tick (discrete, grid-based) --- */
        if (t - lastStep >= STEP_MS) {
          lastStep = t;
          direction.copy(queuedDir);

          // Snapshot previous positions for interpolation
          prevSnake = snake.map(p => ({ ...p }));

          const newHead = {
            x: snake[0].x + direction.x,
            y: 0,
            z: snake[0].z + direction.z,
          };

          const hitWall =
            newHead.x < -HALF || newHead.x > HALF ||
            newHead.z < -HALF || newHead.z > HALF;

          const willEat  = samePos(newHead, food);
          const bodyChk  = willEat ? snake : snake.slice(0, -1);
          const hitSelf  = bodyChk.some(p => samePos(p, newHead));

          if (hitWall || hitSelf) {
            endGame();
          } else {
            snake.unshift(newHead);
            if (willEat) {
              score += 10;
              scoreEl.textContent = String(score);
              spawnFood();
              // New tail segment: use its own position as prev (no jump)
              prevSnake.push({ ...snake[snake.length - 1] });
            } else {
              snake.pop();
            }
            syncSnakeMeshes();
          }
        }

        /* --- Smooth interpolation between ticks --- */
        const elapsed = t - lastStep;
        const alpha   = Math.min(elapsed / STEP_MS, 1);

        for (let i = 0; i < snake.length && i < snakeGroup.children.length; i++) {
          const mesh = snakeGroup.children[i];
          const cur  = snake[i];
          const prev = prevSnake[i] || cur;
          mesh.position.x = prev.x + (cur.x - prev.x) * alpha;
          mesh.position.y = prev.y + (cur.y - prev.y) * alpha;
          mesh.position.z = prev.z + (cur.z - prev.z) * alpha;
        }

        /* --- Smooth camera follow --- */
        const hm = snakeGroup.children[0];
        if (hm) {
          _camTarget.set(hm.position.x + 12, 16, hm.position.z + 16);
          camera.position.lerp(_camTarget, 0.045);
          _camLookAt.set(hm.position.x, 0, hm.position.z);
          camera.lookAt(_camLookAt);
        }

        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      restart();
      requestAnimationFrame(step);
    </script>
  </body>
</html>

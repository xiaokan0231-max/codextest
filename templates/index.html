<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 贪吃蛇（Python + Web）</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        line-height: 1.5;
        user-select: none;
      }
      #hint {
        opacity: 0.8;
        font-size: 13px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      #panel {
        background: rgba(12, 18, 40, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 14px;
        padding: 24px;
        max-width: 360px;
      }
      button {
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: #4f83ff;
        color: #fff;
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #5f91ff;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div>分数：<span id="score">0</span></div>
      <div>最高分：<span id="best">0</span></div>
      <div id="hint">方向键 / WASD 控制；空格暂停</div>
    </div>

    <div id="overlay" hidden>
      <div id="panel">
        <h2 id="title">游戏结束</h2>
        <p id="message"></p>
        <button id="restart">重新开始</button>
      </div>
    </div>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

      const GRID = 18;
      const HALF = Math.floor(GRID / 2);
      const STEP_MS = 180;

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0b1020, 20, 65);

      const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(17, 20, 23);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.45);
      scene.add(ambient);

      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(12, 18, 8);
      dir.castShadow = true;
      scene.add(dir);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(GRID + 2, GRID + 2),
        new THREE.MeshStandardMaterial({ color: 0x101a3a, roughness: 0.9 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.55;
      floor.receiveShadow = true;
      scene.add(floor);

      const gridHelper = new THREE.GridHelper(GRID + 1, GRID + 1, 0x5672c7, 0x324a89);
      scene.add(gridHelper);

      const snakeMat = new THREE.MeshStandardMaterial({ color: 0x47ff8a, emissive: 0x0a5522 });
      const headMat = new THREE.MeshStandardMaterial({ color: 0x8cffd5, emissive: 0x1b7c4b });
      const foodMat = new THREE.MeshStandardMaterial({ color: 0xff5c7a, emissive: 0x661324 });
      const blockGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);

      const snakeGroup = new THREE.Group();
      scene.add(snakeGroup);

      const foodMesh = new THREE.Mesh(blockGeo, foodMat);
      foodMesh.castShadow = true;
      scene.add(foodMesh);

      let snake = [];
      let direction = new THREE.Vector3(1, 0, 0);
      let queuedDir = direction.clone();
      let food = { x: 0, y: 0, z: 0 };
      let score = 0;
      let best = Number(localStorage.getItem('snake3d-best') || 0);
      let paused = false;
      let gameOver = false;

      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const overlay = document.getElementById('overlay');
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      const restartBtn = document.getElementById('restart');
      bestEl.textContent = String(best);

      function toWorld(v) {
        return new THREE.Vector3(v.x, v.y, v.z);
      }

      function samePos(a, b) {
        return a.x === b.x && a.y === b.y && a.z === b.z;
      }

      function randomCell() {
        return {
          x: Math.floor(Math.random() * GRID) - HALF,
          y: 0,
          z: Math.floor(Math.random() * GRID) - HALF,
        };
      }

      function spawnFood() {
        let candidate = randomCell();
        while (snake.some((part) => samePos(part, candidate))) {
          candidate = randomCell();
        }
        food = candidate;
        foodMesh.position.copy(toWorld(food));
      }

      function resetSnake() {
        snake = [
          { x: -2, y: 0, z: 0 },
          { x: -3, y: 0, z: 0 },
          { x: -4, y: 0, z: 0 },
        ];
        direction.set(1, 0, 0);
        queuedDir = direction.clone();
      }

      function setOverlay(show, msg = '') {
        overlay.hidden = !show;
        messageEl.textContent = msg;
      }

      function endGame() {
        gameOver = true;
        if (score > best) {
          best = score;
          localStorage.setItem('snake3d-best', String(best));
          bestEl.textContent = String(best);
        }
        titleEl.textContent = '游戏结束';
        setOverlay(true, `最终得分：${score}`);
      }

      function restart() {
        score = 0;
        paused = false;
        gameOver = false;
        scoreEl.textContent = '0';
        titleEl.textContent = '暂停';
        resetSnake();
        spawnFood();
        setOverlay(false);
        drawSnake();
      }

      function drawSnake() {
        snakeGroup.clear();
        snake.forEach((part, idx) => {
          const mesh = new THREE.Mesh(blockGeo, idx === 0 ? headMat : snakeMat);
          mesh.position.copy(toWorld(part));
          mesh.castShadow = true;
          snakeGroup.add(mesh);
        });
      }

      function isOpposite(next, cur) {
        return next.x + cur.x === 0 && next.z + cur.z === 0;
      }

      const keyDir = {
        ArrowUp: new THREE.Vector3(0, 0, -1),
        KeyW: new THREE.Vector3(0, 0, -1),
        ArrowDown: new THREE.Vector3(0, 0, 1),
        KeyS: new THREE.Vector3(0, 0, 1),
        ArrowLeft: new THREE.Vector3(-1, 0, 0),
        KeyA: new THREE.Vector3(-1, 0, 0),
        ArrowRight: new THREE.Vector3(1, 0, 0),
        KeyD: new THREE.Vector3(1, 0, 0),
      };

      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          if (!gameOver) {
            paused = !paused;
            setOverlay(paused, paused ? '已暂停（空格继续）' : '');
          }
          return;
        }
        if (!(e.code in keyDir) || gameOver) return;
        const next = keyDir[e.code];
        if (!isOpposite(next, direction)) queuedDir = next.clone();
      });

      restartBtn.addEventListener('click', restart);

      let lastStep = 0;
      function step(t) {
        requestAnimationFrame(step);

        foodMesh.rotation.y += 0.03;
        if (paused || gameOver) {
          renderer.render(scene, camera);
          return;
        }

        if (t - lastStep >= STEP_MS) {
          lastStep = t;
          direction.copy(queuedDir);

          const newHead = {
            x: snake[0].x + direction.x,
            y: 0,
            z: snake[0].z + direction.z,
          };

          const hitWall =
            newHead.x < -HALF ||
            newHead.x > HALF ||
            newHead.z < -HALF ||
            newHead.z > HALF;

          const hitSelf = snake.some((part) => samePos(part, newHead));
          if (hitWall || hitSelf) {
            endGame();
          } else {
            snake.unshift(newHead);
            if (samePos(newHead, food)) {
              score += 10;
              scoreEl.textContent = String(score);
              spawnFood();
            } else {
              snake.pop();
            }
            drawSnake();
          }
        }

        const head = snake[0];
        const target = new THREE.Vector3(head.x + 12, 16, head.z + 16);
        camera.position.lerp(target, 0.08);
        camera.lookAt(head.x, 0, head.z);

        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      restart();
      requestAnimationFrame(step);
    </script>
  </body>
</html>
